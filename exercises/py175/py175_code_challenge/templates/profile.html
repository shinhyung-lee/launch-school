{% extends "layout.html" %}

{% block content %}
<div>
  <h3>{{ user.name }}</h3>
  <div>Email: {{ user.email }}</div>
  <div>Interests:
    {{ user.interests | join(', ')}}
  </div>

  <div class="other_users">
    <h3>Other Users</h3>
    <ul>
      {% for user in other_users %}
        <li>
          <a href="{{ url_for('users') }}/{{ user.name }}">
            {{ user.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
